<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowCSS Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./flow.css" />
  <style>
    :root {
      --flow-font-sans: 'DM Sans', system-ui, sans-serif;
      --flow-font-mono: 'DM Mono', monospace;
      --sidebar-w: 260px;
    }

    body {
      font-family: var(--flow-font-sans);
      background: #fff;
      color: var(--flow-gray-900);
    }

    .docs-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      border-right: 1px solid var(--flow-gray-100);
      padding: 1.5rem 1rem;
      background: #fff;
      z-index: 50;
    }

    .sidebar .logo {
      font-weight: 700;
      font-size: 1rem;
      color: #0a0a0a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .sidebar-section {
      margin-bottom: 1.5rem;
    }

    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--flow-gray-400);
      padding: 0 0.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .sidebar-link {
      display: block;
      padding: 0.3rem 0.5rem;
      font-size: 0.875rem;
      color: var(--flow-gray-600);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .sidebar-link:hover {
      color: var(--flow-gray-900);
      background: var(--flow-gray-50);
    }

    .sidebar-link.active {
      color: var(--flow-primary);
      background: rgb(37 99 235/0.07);
      font-weight: 500;
    }

    .docs-main {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 860px;
      padding: 3rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    h2 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 2.5rem 0 0.75rem;
      padding-top: 2rem;
      border-top: 1px solid var(--flow-gray-100);
    }

    h2:first-of-type {
      border-top: none;
      margin-top: 1rem;
    }

    h3 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
    }

    p {
      color: var(--flow-gray-600);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    a {
      color: var(--flow-primary);
      text-decoration: none;
    }

    .lead {
      font-size: 1.125rem;
      color: var(--flow-gray-500);
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 1.25rem 1.5rem;
      border-radius: 10px;
      overflow-x: auto;
      font-family: var(--flow-font-mono);
      font-size: 0.8125rem;
      line-height: 1.8;
      margin: 1rem 0;
    }

    code {
      font-family: var(--flow-font-mono);
      font-size: 0.875em;
      background: var(--flow-gray-100);
      color: var(--flow-gray-800);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }

    pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    .badge-new {
      display: inline-block;
      background: rgb(16 185 129/0.1);
      color: var(--flow-success);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin: 1rem 0;
    }

    .ref-table th {
      text-align: left;
      font-weight: 600;
      padding: 0.6rem 1rem;
      border-bottom: 2px solid var(--flow-gray-200);
      color: var(--flow-gray-500);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ref-table td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--flow-gray-100);
      vertical-align: top;
    }

    .ref-table tr:hover td {
      background: var(--flow-gray-50);
    }

    .ref-table td:first-child code {
      color: var(--flow-primary);
    }

    .callout {
      border-left: 3px solid;
      padding: 1rem 1.25rem;
      border-radius: 0 8px 8px 0;
      margin: 1rem 0;
    }

    .callout--tip {
      border-color: var(--flow-success);
      background: rgb(16 185 129/0.06);
    }

    .callout--info {
      border-color: var(--flow-info);
      background: rgb(6 182 212/0.06);
    }

    .callout p {
      margin: 0;
      font-size: 0.875rem;
    }

    @media(max-width:768px) {
      .sidebar {
        display: none;
      }

      .docs-main {
        margin-left: 0;
        padding: 2rem 1.25rem;
      }
    }
  </style>
</head>

<body>

      </div>

        <a href="#entrance" class="sidebar-link">Entrance</a>
